name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Automation preflight (CI-safe)
        run: npm run automation:preflight:ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
